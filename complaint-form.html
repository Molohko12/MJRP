<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Жалоба на сотрудника — Majestic RP</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="site-logo">Majestic RP</a>
      <nav>
        <ul class="nav-links">
          <li><a href="page2.html">← Назад</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="form-section">
      <h1 class="page-title" style="font-size: 1.5rem; margin-bottom: 1.5rem;">Жалоба на сотрудника</h1>
      <form id="complaint-form">
        <div class="form-group">
          <label for="complainant_name">Ваше ФИО *</label>
          <input type="text" id="complainant_name" name="complainant_name" required placeholder="Иванов Иван Иванович">
        </div>
        <div class="form-group">
          <label for="target_employee">ФИО сотрудника-объекта *</label>
          <input type="text" id="target_employee" name="target_employee" required placeholder="ФИО нарушителя">
        </div>
        <div class="form-group">
          <label for="incident_date">Дата инцидента *</label>
          <input type="date" id="incident_date" name="incident_date" required>
        </div>
        <div class="form-group">
          <label for="description">Описание ситуации *</label>
          <textarea id="description" name="description" required placeholder="Подробно опишите инцидент"></textarea>
        </div>
        <div class="form-group">
          <label for="contact">Контакт *</label>
          <input type="text" id="contact" name="contact" required placeholder="Телефон или Discord">
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Отправить жалобу</button>
          <a href="page2.html" class="btn btn-secondary">Отмена</a>
        </div>
      </form>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    document.getElementById("complaint-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const form = e.target;
      const data = {
        complainant_name: form.complainant_name.value.trim(),
        target_employee: form.target_employee.value.trim(),
        incident_date: form.incident_date.value,
        description: form.description.value.trim(),
        contact: form.contact.value.trim(),
      };

      try {
        await API.createComplaint(data);
        showToast("Жалоба успешно отправлена на сервер", "success");
        form.reset();
        setTimeout(() => (location.href = "page2.html"), 1500);
      } catch (err) {
        showToast("Ошибка отправки: " + err.message, "error");
      }
    });
  </script>
</body>
</html>
